<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望舒夜前锵锵行</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 背景层 -->
    <div class="background-container">
        <img src="bg.jpg" alt="Night Sea" class="bg-image">
        <div class="overlay"></div>
    </div>

    <!-- 主场景 -->
    <div class="scene">
        <div class="moon-container">
            <div class="moon"></div>
            <div class="moon-reflection"></div>
        </div>

        <div class="sea-sparkles"></div>

        <div class="intro-text" id="introText">
            <p>望舒夜前锵锵行</p>
        </div>

        <div class="stars-container" id="starsContainer"></div>

        <div class="search-container" id="searchBox">
            <input type="text" id="aiInput" placeholder="我们的应许之地..." autocomplete="off">
            <button onclick="searchDestination()" id="searchBtn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- 攻略详情弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
